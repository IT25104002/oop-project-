# ===================================================================
# FITNAZE CORE APPLICATION CONFIGURATION
# ===================================================================

# Application Identity
spring.application.name=gym-backend

# View Resolver Configuration (FIXES THE WHITELABEL ERROR)
# Points Spring Boot directly to the root of your webapp folder where your JSPs live
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.jsp

# Server Configuration
# Runs your application on the default port (http://localhost:8080)
server.port=8080

# Logging Configuration
# Clean, readable console logs for tracking down system bugs
logging.level.org.springframework.web=INFO
logging.level.com.fitnaze.demo=DEBUG